services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: solera-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ChangeMe123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' -C || exit 1"
      ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  sqlserver_data:
